<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent Team</title>
    <style>
      /* splash — โชว์ทันทีที่ webview เปิด กันขาวแวบระหว่างโหลด bundle/assets */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: radial-gradient(circle at 50% 35%, #16224a 0%, #060912 70%);
        color: #cdd6f4;
        font-family: "Space Mono", ui-monospace, monospace;
        transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .sp-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #7dd3fc;
      }
      #splash .sp-title span { color: #cdd6f4; }
      #splash .sp-sub { font-size: 12px; color: #64748b; }
      #splash .sp-ring {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(125, 211, 252, 0.25);
        border-top-color: #7dd3fc;
        border-radius: 50%;
        animation: sp-spin 0.9s linear infinite;
      }
      @keyframes sp-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="sp-title">GUILD<span>นักผจญภัย</span></div>
      <div class="sp-ring"></div>
      <div class="sp-sub">กำลังเปิดกิลด์…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
