name: release

# build installers for macOS + Windows and publish them to a GitHub Release.
# trigger by pushing a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
# workflow_dispatch lets you run a build manually (no release published).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # needed for tauri-action to create the release
    strategy:
      fail-fast: false
      matrix:
        include:
          # universal binary -> runs on both Apple Silicon and Intel Macs
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          # x64 .msi + .exe (NSIS) installer
          - platform: windows-latest
            target: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: cache rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend deps
        run: npm ci

      - name: build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # only publish a release when run from a tag; manual runs just build
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('AI Agent Team {0}', github.ref_name) || '' }}
          releaseBody: |
            ## Install

            Download the installer for your OS from the assets below.

            **macOS** — `.dmg` (universal). App is **unsigned/un-notarized**, so
            Gatekeeper shows _"Apple could not verify ... is free of malware"_.
            To open it:

            - **System Settings → Privacy & Security** → scroll down → **Open Anyway**
              → confirm. (On macOS Sequoia, right-click → Open no longer works — use
              this.)
            - Or run in Terminal:
              `xattr -dr com.apple.quarantine "/Applications/AI Agent Team.app"`

            **Windows** — `.msi` or `.exe` (NSIS). App is **unsigned**: SmartScreen
            shows "Windows protected your PC" → More info → Run anyway.

            > Requires Claude Code installed and logged in with a Pro/Max subscription
            > (`npm i -g @anthropic-ai/claude-code` then `claude` login).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
